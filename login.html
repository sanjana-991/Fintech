<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FinTech Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="auth-container">

</div>

<script src="login.js"></script>
</body>
</html>
