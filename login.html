<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Creative Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">
        <!-- Left Content -->
        <div class="left">
            <h1>Organise.</h1>
            <p>
                Welcome to a smarter way to manage your finances. 
                Log in to experience secure, seamless digital transactions, 
                real-time insights, and effortless control over your money ALL IN ONE PLACE.
            </p>
            <a href="#" class="btn">Learn More</a>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h2>FINTECH</h2>

            <form>
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                </div>

                <button type="submit">LOGIN</button>
            </form>
        </div>
    </div>

</body>
</html>
