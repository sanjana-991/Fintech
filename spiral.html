<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Open Finance</title>
  <link rel="stylesheet" href="spiral.css" />
</head>
<body>

<header class="nav">
  <div class="logo">MERIDIAN</div>

  <nav class="links">
    <a>Why Meridian</a>
    <a>Community</a>
    <a>Case Studies</a>
  </nav>

  <button class="cta">
    Get started
    <span>↗</span>
  </button>
</header>

<main class="hero">
    <div class="orbit-axis">
        <span class="star s1"></span>
        <span class="star s2"></span>
        <span class="star s3"></span>
        <span class="star s4"></span>
        <span class="star s5"></span>
    </div>

    <div class="orbit-axis second-axis">
        <span class="star s1"></span>
        <span class="star s2"></span>
        <span class="star s3"></span>
        <span class="star s4"></span>
        <span class="star s5"></span>
    </div>

    <div class="pill-left second-pill-left">
        <div class="icon">⚡</div>
        <p>Secure digital<br/>payments<br/>worldwide</p>
    </div>

    <div class="pill-right second-pill-right">
        <div class="avatar"></div>
        <div>
            <p class="name">Ava Stone</p>
            <span class="role">CTO</span>
        </div>
    </div>
  <div class="pill-left">
    <div class="icon">₿</div>
    <p>Leading open source<br/>financial technology<br/>that works</p>
  </div>

  <div class="sphere-wrap">
  <div class="sphere"></div>

  <div class="sphere-text">
    <span class="spark">✦</span>
    <h1>FIN<br/>TECH</h1>
  </div>
</div>


  <div class="pill-right">
    <div class="avatar"></div>
    <div>
      <p class="name">John Nikols</p>
      <span class="role">Founder</span>
    </div>
  </div>

</main>

</body>
</html>
